# Farm Credibly — Hermes Agent Configuration
# Full reference: https://github.com/NousResearch/hermes-agent/blob/main/cli-config.yaml.example

# =============================================================================
# Model
# =============================================================================
model:
  provider: openrouter
  default: anthropic/claude-3-5-haiku   # Fast, large context, good Patois approximation.
  # Alternatives (all via OpenRouter):
  # - anthropic/claude-sonnet-4-5        # Higher quality, higher cost
  # - meta-llama/llama-3.3-70b-instruct  # Open-source fallback, 131K context

# =============================================================================
# Gateway — Telegram
# =============================================================================
gateway:
  telegram:
    enabled: true
    # Restrict to specific Telegram user IDs. Find yours by messaging @userinfobot.
    # Leave empty to allow any user (not recommended for production).
    allowed_users:
      - "${TELEGRAM_ALLOWED_USER_ID}"

# =============================================================================
# Speech-to-Text (STT)
# Voice messages sent by farmers are automatically transcribed.
# =============================================================================
stt:
  enabled: true
  provider: local          # free, runs on-device via faster-whisper
  local:
    model: base            # ~150 MB, downloads once on first voice message, stored in volume.
                           # Use "small" for better accuracy at ~2x CPU cost.
                           # compute_type auto-selects int8 on CPU (no config needed).
    # language: en         # Force English. Leave blank for auto-detect (Patois → en).

  # Faster alternative: Groq STT (free tier, ~10x faster than local on CPU).
  # Add GROQ_API_KEY to .env and switch provider to "groq".
  # groq: {}               # no extra config needed — just set GROQ_API_KEY in .env

# =============================================================================
# Text-to-Speech (TTS)
# When a farmer sends a voice message, Clara replies with audio too.
# =============================================================================
tts:
  provider: edge           # Microsoft Edge TTS — free, no API key needed
  edge:
    voice: en-JM-OrlaNeural  # Jamaican English female (Microsoft neural voice).
    # Alternative Jamaican voice: en-JM-NoahNeural (male)
    # Other Caribbean options:  en-TT-KerwinNeural (Trinidad), en-BB-SamanthaNeural (Barbados)
    #
    # Upgrade path: switch to ElevenLabs for higher quality / voice cloning
    # provider: elevenlabs
    # elevenlabs:
    #   voice_id: <your-cloned-voice-id>    # clone a Jamaican speaker for authentic audio

# =============================================================================
# Memory
# =============================================================================
memory:
  enabled: true            # Hermes builds a persistent model of each user across sessions

# =============================================================================
# Context Compression
# Auto-compresses long conversations to stay within model context limits.
# =============================================================================
compression:
  enabled: true
  threshold: 0.65          # Compress when 65% of context window is used

# =============================================================================
# Agent
# =============================================================================
agent:
  max_turns: 20            # Max tool-calling iterations per message (lower = cheaper)

# =============================================================================
# Display (Gateway)
# =============================================================================
display:
  tool_progress: new       # Show tool activity only when the tool changes (reduces noise)
  interim_assistant_messages: true
